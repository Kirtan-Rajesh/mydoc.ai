name: mydoc_mobile
description: mydoc.ai — health records & AI assistant for iOS and Android

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0

  # Networking
  dio: ^5.4.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Files & media
  file_picker: ^8.0.0
  image_picker: ^1.1.0

  # Reminders (mobile only; no-op on web)
  flutter_local_notifications: ^17.2.2
  flutter_timezone: ^2.1.0
  timezone: ^0.9.4

  # UI / utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
